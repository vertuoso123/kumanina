<!DOCTYPE html>
<html>
<head>
  <title>Video Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { margin:0; background:#0d0d0d; color:#fff; font-family:Arial; }
    header { background:#000; padding:15px; text-align:center; font-size:22px; }
    nav { display:flex; overflow-x:auto; background:#111; padding:10px; gap:10px; }
    nav button { background:#222; border:none; color:#fff; padding:8px 12px; border-radius:20px; cursor:pointer; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; padding:10px; }
    .card { background:#1a1a1a; border-radius:10px; overflow:hidden; }
    .card img { width:100%; height:130px; object-fit:cover; }
    .title { padding:8px; font-size:13px; }
  </style>
</head>
<body>

<header>🔥 Video Hub</header>

<nav>
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('trending')">Trending</button>
  <button onclick="filterCategory('latest')">Latest</button>
</nav>

<div class="grid" id="posts"></div>

<script>
let allPosts = [];
let visible = 0;
let currentCategory = 'all';

fetch('/posts.json')
.then(res => res.json())
.then(data => {
  allPosts = data;
  loadMore();
});

function loadMore() {
  let container = document.getElementById('posts');

  let filtered = currentCategory === 'all'
    ? allPosts
    : allPosts.filter(p => p.category === currentCategory);

  let next = filtered.slice(visible, visible + 10);

  next.forEach((post, index) => {
    container.innerHTML += `
      <a href="/post.html?vid=${index}">
        <div class="card">
          <img src="${post.thumbnail}">
          <div class="title">${post.title}</div>
        </div>
      </a>
    `;
  });

  visible += 10;
}

function filterCategory(cat) {
  currentCategory = cat;
  visible = 0;
  document.getElementById('posts').innerHTML = "";
  loadMore();
}

window.onscroll = () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loadMore();
  }
};
</script>

</body>
</html>
